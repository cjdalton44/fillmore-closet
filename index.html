<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Dress-Up Game</title>\n    <link rel="stylesheet" href="styles.css">\n</head>\n<body>\n    <header>\n        <h1>Welcome to the Dress-Up Game!</h1>\n        <p>Choose your outfits and create your unique style.</p>\n    </header>\n    <main>\n        <section id="clothes">\n            <h2>Choose Your Clothes</h2>\n            <div class="clothing-item">\n                <img src="dress1.png" alt="Dress 1">\n                <button>Select Dress 1</button>\n            </div>\n            <div class="clothing-item">\n                <img src="dress2.png" alt="Dress 2">\n                <button>Select Dress 2</button>\n            </div>\n            <!-- Add more clothing items as needed -->\n        </section>\n        <section id="selected-outfit">\n            <h2>Your Selected Outfit</h2>\n            <div id="outfit-display">\n                <!-- Selected outfit will be displayed here -->\n            </div>\n        </section>\n    </main>\n    <footer>\n        <p>&copy; 2026 Dress-Up Game. All rights reserved.</p>\n    </footer>\n    <script src="script.js"></script>\n</body>\n</html>
