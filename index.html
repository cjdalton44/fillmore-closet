<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dress-Up Game</title>
    <style>
        body {
            align-items: center;
            display: flex;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        #game {
            position: relative;
            width: 400px;
            height: 600px;
            overflow: hidden;
        }
        .character {
            position: absolute;
            width: 100%;
            height: auto;
        }
        .clothing {
            position: absolute;
            width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <div id="game">
        <img src="brunette-woman.png" alt="Brunette Woman" class="character" id="brunette">
        <img src="red-haired-man.png" alt="Red-Haired Man" class="character" id="redhead">
        <img src="shirt.png" alt="Shirt" class="clothing" id="shirt">
        <img src="pants.png" alt="Pants" class="clothing" id="pants">
        <img src="shoes.png" alt="Shoes" class="clothing" id="shoes">
        <img src="glasses.png" alt="Glasses" class="clothing" id="glasses">
        <img src="hat.png" alt="Hat" class="clothing" id="hat">
        <img src="jewelry.png" alt="Jewelry" class="clothing" id="jewelry">
    </div>
    <script>
        // JavaScript code to handle clothing overlay logic can be added here
    </script>
</body>
</html>
